# ==========================================
# Database Connection Settings
# ==========================================
# >> H2 In-Memory Database (for testing without MySQL) <<
spring.datasource.url=jdbc:h2:mem:hiresync_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# >> MySQL (uncomment below and comment H2 above when MySQL is available) <<
# spring.datasource.url=jdbc:mysql://localhost:3306/hiresync_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Settings
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ==========================================
# Thymeleaf Settings
# ==========================================
spring.thymeleaf.cache=false

# ==========================================
# File Upload Configuration
# ==========================================
# Define maximum file upload size (resumes)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Custom directory path where resumes will be saved
file.upload-dir=uploads/resumes
app.upload.dir=uploads/resumes

# ==========================================
# Email Notification Configuration (Java Mail)
# ==========================================
# Adjust these parameters to connect to your SMTP server (e.g. Gmail, Mailtrap)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================================
# Security and Logger Settings
# ==========================================
# Enables custom security logs
logging.level.org.springframework.security=INFO

# ==========================================
# AI / LLM Matching Configuration (Optional)
# ==========================================
ai.api.key=${AI_API_KEY:}
ai.api.url=${AI_API_URL:}
ai.provider=${AI_PROVIDER:rule-based}
