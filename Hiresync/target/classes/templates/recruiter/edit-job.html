<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Job - HireSync</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="brand">
                <i class="bi bi-briefcase-fill me-2" style="color: var(--primary-color);"></i>HireSync
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-menu-item">
                    <a th:href="@{/recruiter/dashboard}" class="sidebar-menu-link">
                        <i class="bi bi-speedometer2 me-2"></i>Dashboard
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a th:href="@{/recruiter/jobs/post}" class="sidebar-menu-link">
                        <i class="bi bi-plus-circle me-2"></i>Post a Job
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a th:href="@{/recruiter/jobs}" class="sidebar-menu-link active">
                        <i class="bi bi-list-task me-2"></i>Manage Jobs
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a th:href="@{/recruiter/applications}" class="sidebar-menu-link">
                        <i class="bi bi-people me-2"></i>Applicants List
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a th:href="@{/recruiter/shortlisted}" class="sidebar-menu-link">
                        <i class="bi bi-star me-2"></i>Shortlisted Candidates
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a th:href="@{/recruiter/interviews}" class="sidebar-menu-link">
                        <i class="bi bi-calendar-event me-2"></i>Interview Schedule
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a th:href="@{/recruiter/profile}" class="sidebar-menu-link">
                        <i class="bi bi-person-gear me-2"></i>Company Profile
                    </a>
                </li>
                <li class="sidebar-menu-item mt-4">
                    <form th:action="@{/logout}" method="post" class="px-3">
                        <button type="submit" class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center">
                            <i class="bi bi-box-arrow-right me-2"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <div>
                    <h2 class="fw-bold mb-0">Edit Job Posting</h2>
                    <p class="text-muted small mb-0">Modify details of your published job</p>
                </div>
            </div>

            <!-- Alerts -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- Form -->
            <div class="card card-custom p-4 bg-white shadow-sm" style="max-width: 800px;">
                <form th:action="@{/recruiter/jobs/edit/{id}(id=${job.id})}" method="post" th:object="${job}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="title" class="form-label fw-semibold text-muted small">Job Title *</label>
                            <input type="text" class="form-control" id="title" th:field="*{title}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="jobType" class="form-label fw-semibold text-muted small">Job Type *</label>
                            <select class="form-select" id="jobType" th:field="*{jobType}" required>
                                <option value="Full-time">Full-time</option>
                                <option value="Part-time">Part-time</option>
                                <option value="Internship">Internship</option>
                                <option value="Remote">Remote</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="location" class="form-label fw-semibold text-muted small">Location *</label>
                            <input type="text" class="form-control" id="location" th:field="*{location}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="salaryRange" class="form-label fw-semibold text-muted small">Salary Range</label>
                            <input type="text" class="form-control" id="salaryRange" th:field="*{salaryRange}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="experienceRequired" class="form-label fw-semibold text-muted small">Experience Required *</label>
                            <input type="text" class="form-control" id="experienceRequired" th:field="*{experienceRequired}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="openings" class="form-label fw-semibold text-muted small">Number of Openings *</label>
                            <input type="number" class="form-control" id="openings" th:field="*{openings}" required min="1">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="requiredSkills" class="form-label fw-semibold text-muted small">Required Skills (Comma separated) *</label>
                            <input type="text" class="form-control" id="requiredSkills" th:field="*{requiredSkills}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="status" class="form-label fw-semibold text-muted small">Status *</label>
                            <select class="form-select" id="status" th:field="*{status}" required>
                                <option value="ACTIVE">Active</option>
                                <option value="CLOSED">Closed</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="lastDateToApply" class="form-label fw-semibold text-muted small">Last Date to Apply *</label>
                        <input type="date" class="form-control" id="lastDateToApply" th:field="*{lastDateToApply}" required>
                    </div>

                    <div class="mb-4">
                        <label for="description" class="form-label fw-semibold text-muted small">Job Description *</label>
                        <textarea class="form-control" id="description" th:field="*{description}" rows="5" required></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/recruiter/jobs}" class="btn btn-outline-secondary px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary-custom px-4">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
