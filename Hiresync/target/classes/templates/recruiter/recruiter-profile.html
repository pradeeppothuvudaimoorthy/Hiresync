<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Profile - HireSync</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="brand">
                <i class="bi bi-briefcase-fill me-2" style="color: var(--primary-color);"></i>HireSync
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-menu-item">
                    <a th:href="@{/recruiter/dashboard}" class="sidebar-menu-link">
                        <i class="bi bi-speedometer2 me-2"></i>Dashboard
                    </a>
                </li>
                <!-- Only show items if recruiter is approved -->
                <li class="sidebar-menu-item" th:if="${recruiter.status == 'APPROVED'}">
                    <a th:href="@{/recruiter/jobs/post}" class="sidebar-menu-link">
                        <i class="bi bi-plus-circle me-2"></i>Post a Job
                    </a>
                </li>
                <li class="sidebar-menu-item" th:if="${recruiter.status == 'APPROVED'}">
                    <a th:href="@{/recruiter/jobs}" class="sidebar-menu-link">
                        <i class="bi bi-list-task me-2"></i>Manage Jobs
                    </a>
                </li>
                <li class="sidebar-menu-item" th:if="${recruiter.status == 'APPROVED'}">
                    <a th:href="@{/recruiter/applications}" class="sidebar-menu-link">
                        <i class="bi bi-people me-2"></i>Applicants List
                    </a>
                </li>
                <li class="sidebar-menu-item" th:if="${recruiter.status == 'APPROVED'}">
                    <a th:href="@{/recruiter/shortlisted}" class="sidebar-menu-link">
                        <i class="bi bi-star me-2"></i>Shortlisted Candidates
                    </a>
                </li>
                <li class="sidebar-menu-item" th:if="${recruiter.status == 'APPROVED'}">
                    <a th:href="@{/recruiter/interviews}" class="sidebar-menu-link">
                        <i class="bi bi-calendar-event me-2"></i>Interview Schedule
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a th:href="@{/recruiter/profile}" class="sidebar-menu-link active">
                        <i class="bi bi-person-gear me-2"></i>Company Profile
                    </a>
                </li>
                <li class="sidebar-menu-item mt-4">
                    <form th:action="@{/logout}" method="post" class="px-3">
                        <button type="submit" class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center">
                            <i class="bi bi-box-arrow-right me-2"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <div>
                    <h2 class="fw-bold mb-0">Company Profile</h2>
                    <p class="text-muted small mb-0">Manage company settings, websites, contacts, and location data</p>
                </div>
            </div>

            <!-- Alerts -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- Profile Info Form -->
            <div class="card card-custom p-4 bg-white shadow-sm" style="max-width: 700px;">
                <form th:action="@{/recruiter/profile/update}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-muted small">Registered Email (Cannot be changed)</label>
                        <input type="email" class="form-control bg-light" th:value="${recruiter.user.email}" disabled>
                    </div>

                    <div class="mb-3">
                        <label for="companyName" class="form-label fw-semibold text-muted small">Company Name *</label>
                        <input type="text" class="form-control" id="companyName" name="companyName" th:value="${recruiter.companyName}" required>
                    </div>

                    <div class="mb-3">
                        <label for="companyWebsite" class="form-label fw-semibold text-muted small">Company Website</label>
                        <input type="url" class="form-control" id="companyWebsite" name="companyWebsite" th:value="${recruiter.companyWebsite}" placeholder="https://your-company.com">
                    </div>

                    <div class="mb-3">
                        <label for="companyLocation" class="form-label fw-semibold text-muted small">Company Location</label>
                        <input type="text" class="form-control" id="companyLocation" name="companyLocation" th:value="${recruiter.companyLocation}" placeholder="e.g. San Francisco, CA">
                    </div>

                    <div class="mb-4">
                        <label for="phone" class="form-label fw-semibold text-muted small">HR Contact Phone *</label>
                        <input type="tel" class="form-control" id="phone" name="phone" th:value="${recruiter.phone}" required>
                    </div>

                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn btn-primary-custom px-5 py-2">Save Profile Updates</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
