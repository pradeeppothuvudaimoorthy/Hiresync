<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - HireSync</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="brand">
                <i class="bi bi-briefcase-fill me-2" style="color: var(--primary-color);"></i>HireSync
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-menu-item">
                    <a th:href="@{/admin/dashboard}" class="sidebar-menu-link">
                        <i class="bi bi-speedometer2 me-2"></i>Dashboard
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a th:href="@{/admin/manage-users}" class="sidebar-menu-link active">
                        <i class="bi bi-people me-2"></i>Manage Users
                    </a>
                </li>
                <li class="sidebar-menu-item mt-4">
                    <form th:action="@{/logout}" method="post" class="px-3">
                        <button type="submit" class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center">
                            <i class="bi bi-box-arrow-right me-2"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <div>
                    <h2 class="fw-bold mb-0">User Management</h2>
                    <p class="text-muted small mb-0">View all system users and delete accounts</p>
                </div>
                <div class="d-flex align-items-center">
                    <span class="fw-semibold me-3 text-muted">Admin Account: <strong class="text-dark" sec:authentication="name">Admin</strong></span>
                </div>
            </div>

            <!-- Flash Messages -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- User Table -->
            <div class="card card-custom">
                <div class="card-header bg-white py-3">
                    <h5 class="fw-bold mb-0"><i class="bi bi-people-fill me-2 text-indigo"></i>All Users</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-custom table-hover m-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Full Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Joined Date</th>
                                    <th class="text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="u : ${users}">
                                    <td th:text="${u.id}">1</td>
                                    <td class="fw-semibold" th:text="${u.name}">John Doe</td>
                                    <td th:text="${u.email}">john.doe@example.com</td>
                                    <td>
                                        <span th:if="${u.role.name() == 'ADMIN'}" class="badge bg-dark text-white px-2 py-1">ADMIN</span>
                                        <span th:if="${u.role.name() == 'RECRUITER'}" class="badge bg-primary text-white px-2 py-1">RECRUITER</span>
                                        <span th:if="${u.role.name() == 'CANDIDATE'}" class="badge bg-success text-white px-2 py-1">CANDIDATE</span>
                                    </td>
                                    <td th:text="${#temporals.format(u.createdAt, 'yyyy-MM-dd HH:mm')}">2026-06-19 12:00</td>
                                    <td class="text-center">
                                        <!-- Prevent Admin from deleting their own logged in account -->
                                        <form th:if="${#authentication.name != u.email}" th:action="@{/admin/users/delete/{id}(id=${u.id})}" method="post" onsubmit="return confirm('Are you sure you want to delete this user? This will remove all associated profiles and data!');">
                                            <button type="submit" class="btn btn-sm btn-danger py-1 px-2 d-flex align-items-center mx-auto">
                                                <i class="bi bi-trash me-1"></i>Delete
                                            </button>
                                        </form>
                                        <span th:unless="${#authentication.name != u.email}" class="text-muted small">Active Session</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
