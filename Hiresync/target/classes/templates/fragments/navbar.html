<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
</head>
<body>
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark px-4 py-3 shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-4" th:href="@{/}">
                <i class="bi bi-briefcase-fill me-2 text-indigo"></i>HireSync
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Home</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('CANDIDATE')">
                        <a class="nav-link" th:href="@{/candidate/browse}">Browse Jobs</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('CANDIDATE')">
                        <a class="nav-link" th:href="@{/candidate/recommended}">Recommended Jobs</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto align-items-center">
                    <!-- Guest Links -->
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="btn btn-outline-light me-2" th:href="@{/login}">Login</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="btn btn-primary" th:href="@{/register}">Register</a>
                    </li>
                    
                    <!-- Authenticated Links -->
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle text-white fw-semibold" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <span sec:authentication="name">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm" aria-labelledby="navbarDropdown">
                            <!-- Role Specific Dashboards -->
                            <li sec:authorize="hasRole('ADMIN')">
                                <a class="dropdown-item" th:href="@{/admin/dashboard}">Admin Dashboard</a>
                            </li>
                            <li sec:authorize="hasRole('RECRUITER')">
                                <a class="dropdown-item" th:href="@{/recruiter/dashboard}">Recruiter Dashboard</a>
                            </li>
                            <li sec:authorize="hasRole('CANDIDATE')">
                                <a class="dropdown-item" th:href="@{/candidate/dashboard}">Candidate Dashboard</a>
                            </li>
                            
                            <li sec:authorize="hasRole('CANDIDATE')">
                                <a class="dropdown-item" th:href="@{/candidate/profile}">My Profile</a>
                            </li>
                            <li sec:authorize="hasRole('RECRUITER')">
                                <a class="dropdown-item" th:href="@{/recruiter/profile}">Company Profile</a>
                            </li>
                            
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="m-0">
                                    <button type="submit" class="dropdown-item text-danger">Logout</button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</body>
</html>
