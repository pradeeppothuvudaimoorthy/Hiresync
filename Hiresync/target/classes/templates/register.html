<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HireSync</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar Fragment -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="auth-wrapper">
        <div class="card card-custom auth-card shadow-sm bg-white" style="max-width: 580px;">
            <div class="text-center mb-4">
                <h2 class="fw-bold mb-1" style="color: var(--primary-color);">Create Account</h2>
                <p class="text-muted small">Choose your role and register to begin</p>
            </div>

            <!-- Error Alerts -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- Tab Headers -->
            <ul class="nav nav-tabs nav-tabs-custom justify-content-center" id="registerTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="candidate-tab" data-bs-toggle="tab" data-bs-target="#candidate" type="button" role="tab" aria-controls="candidate" aria-selected="true">
                        <i class="bi bi-person-badge me-2"></i>Candidate
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="recruiter-tab" data-bs-toggle="tab" data-bs-target="#recruiter" type="button" role="tab" aria-controls="recruiter" aria-selected="false">
                        <i class="bi bi-building me-2"></i>Recruiter
                    </button>
                </li>
            </ul>

            <!-- Tab Content -->
            <div class="tab-content" id="registerTabContent">
                <!-- Candidate Form -->
                <div class="tab-pane fade show active" id="candidate" role="tabpanel" aria-labelledby="candidate-tab">
                    <form th:action="@{/register/candidate}" method="post">
                        <div class="mb-3">
                            <label for="c_name" class="form-label fw-semibold text-muted small">Full Name</label>
                            <input type="text" class="form-control" id="c_name" name="name" required placeholder="John Doe">
                        </div>
                        <div class="mb-3">
                            <label for="c_email" class="form-label fw-semibold text-muted small">Email Address</label>
                            <input type="email" class="form-control" id="c_email" name="email" required placeholder="john.doe@example.com">
                        </div>
                        <div class="mb-3">
                            <label for="c_password" class="form-label fw-semibold text-muted small">Password</label>
                            <input type="password" class="form-control" id="c_password" name="password" required placeholder="••••••••">
                        </div>
                        <div class="mb-4">
                            <label for="c_phone" class="form-label fw-semibold text-muted small">Phone Number</label>
                            <input type="tel" class="form-control" id="c_phone" name="phone" required placeholder="+1 (234) 567-890">
                        </div>
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary-custom py-2 fw-semibold">Register as Candidate</button>
                        </div>
                    </form>
                </div>

                <!-- Recruiter Form -->
                <div class="tab-pane fade" id="recruiter" role="tabpanel" aria-labelledby="recruiter-tab">
                    <form th:action="@{/register/recruiter}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="r_name" class="form-label fw-semibold text-muted small">Full Name</label>
                                <input type="text" class="form-control" id="r_name" name="name" required placeholder="HR Manager Name">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="r_email" class="form-label fw-semibold text-muted small">Email Address</label>
                                <input type="email" class="form-control" id="r_email" name="email" required placeholder="company.hr@example.com">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="r_password" class="form-label fw-semibold text-muted small">Password</label>
                                <input type="password" class="form-control" id="r_password" name="password" required placeholder="••••••••">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="r_phone" class="form-label fw-semibold text-muted small">Phone Number</label>
                                <input type="tel" class="form-control" id="r_phone" name="phone" required placeholder="HR Contact Number">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="r_compName" class="form-label fw-semibold text-muted small">Company Name</label>
                            <input type="text" class="form-control" id="r_compName" name="companyName" required placeholder="Google Inc.">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="r_compWebsite" class="form-label fw-semibold text-muted small">Company Website</label>
                                <input type="url" class="form-control" id="r_compWebsite" name="companyWebsite" placeholder="https://google.com">
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="r_compLoc" class="form-label fw-semibold text-muted small">Company Location</label>
                                <input type="text" class="form-control" id="r_compLoc" name="companyLocation" placeholder="Mountain View, CA">
                            </div>
                        </div>
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary-custom py-2 fw-semibold" style="background-color: var(--secondary-color); border-color: var(--secondary-color);">Register as Recruiter</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="text-center mt-3">
                <span class="text-muted small">Already have an account? </span>
                <a th:href="@{/login}" class="small fw-bold text-decoration-none" style="color: var(--primary-color);">Sign In</a>
            </div>
        </div>
    </div>

    <!-- Footer Fragment -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Tab Activation Script -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const tabParam = urlParams.get('tab');
            if (tabParam === 'recruiter') {
                const recruiterTab = document.querySelector('#recruiter-tab');
                const candidateTab = document.querySelector('#candidate-tab');
                const recruiterPane = document.querySelector('#recruiter');
                const candidatePane = document.querySelector('#candidate');
                
                candidateTab.classList.remove('active');
                candidateTab.setAttribute('aria-selected', 'false');
                recruiterTab.classList.add('active');
                recruiterTab.setAttribute('aria-selected', 'true');
                
                candidatePane.classList.remove('show', 'active');
                recruiterPane.classList.add('show', 'active');
            }
        });
    </script>
</body>
</html>
