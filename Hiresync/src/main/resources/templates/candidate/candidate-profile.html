<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - HireSync</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="brand">
                <i class="bi bi-briefcase-fill me-2" style="color: var(--primary-color);"></i>HireSync
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-menu-item">
                    <a th:href="@{/candidate/dashboard}" class="sidebar-menu-link">
                        <i class="bi bi-speedometer2 me-2"></i>Dashboard
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a th:href="@{/candidate/profile}" class="sidebar-menu-link active">
                        <i class="bi bi-person-circle me-2"></i>My Profile
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a th:href="@{/candidate/resume/upload}" class="sidebar-menu-link">
                        <i class="bi bi-file-earmark-arrow-up me-2"></i>Upload Resume
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a th:href="@{/candidate/browse}" class="sidebar-menu-link">
                        <i class="bi bi-search me-2"></i>Browse Jobs
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a th:href="@{/candidate/recommended}" class="sidebar-menu-link">
                        <i class="bi bi-stars me-2"></i>Recommended Jobs
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a th:href="@{/candidate/applied}" class="sidebar-menu-link">
                        <i class="bi bi-journal-check me-2"></i>Applied Jobs
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a th:href="@{/candidate/interviews}" class="sidebar-menu-link">
                        <i class="bi bi-calendar3 me-2"></i>Interviews
                    </a>
                </li>
                <li class="sidebar-menu-item mt-4">
                    <form th:action="@{/logout}" method="post" class="px-3">
                        <button type="submit" class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center">
                            <i class="bi bi-box-arrow-right me-2"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <div>
                    <h2 class="fw-bold mb-0">My Profile</h2>
                    <p class="text-muted small mb-0">Update your education, skills, location, and experience profile</p>
                </div>
            </div>

            <!-- Alerts -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- Profile Info Form -->
            <div class="card card-custom p-4 bg-white shadow-sm" style="max-width: 700px;">
                <form th:action="@{/candidate/profile/update}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold text-muted small">Full Name</label>
                            <input type="text" class="form-control bg-light" th:value="${candidate.user.name}" disabled>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold text-muted small">Email Address</label>
                            <input type="email" class="form-control bg-light" th:value="${candidate.user.email}" disabled>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label fw-semibold text-muted small">Phone Number *</label>
                        <input type="tel" class="form-control" id="phone" name="phone" th:value="${candidate.phone}" required>
                    </div>

                    <div class="mb-3">
                        <label for="education" class="form-label fw-semibold text-muted small">Highest Education</label>
                        <input type="text" class="form-control" id="education" name="education" th:value="${candidate.education}" placeholder="e.g. B.Tech in Computer Science, MCA">
                    </div>

                    <div class="mb-3">
                        <label for="skills" class="form-label fw-semibold text-muted small">Skills (Comma separated) *</label>
                        <input type="text" class="form-control" id="skills" name="skills" th:value="${candidate.skills}" required placeholder="e.g. Java, Spring Boot, MySQL, JavaScript">
                        <small class="text-muted">Enter skills separated by commas to align with AI job matching calculations (case-insensitive).</small>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label for="experience" class="form-label fw-semibold text-muted small">Experience (Years / Details)</label>
                            <input type="text" class="form-control" id="experience" name="experience" th:value="${candidate.experience}" placeholder="e.g. 2 Years, Freshers">
                        </div>
                        <div class="col-md-6 mb-4">
                            <label for="location" class="form-label fw-semibold text-muted small">Location</label>
                            <input type="text" class="form-control" id="location" name="location" th:value="${candidate.location}" placeholder="e.g. Boston, MA or Remote">
                        </div>
                    </div>

                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn btn-primary-custom px-5 py-2">Save Profile Updates</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
